<?xml version="1.0" encoding="UTF-8"?>
<!-- Von Peach VP lettermark favicon. Generated SVG approximating the
     attached PNG asset — bold italic display sans on a peach rounded
     square. Replace with the original PNG version when convenient by
     dropping /favicon.png next to this file (the <link rel="alternate
     icon" type="image/png"> fallback in each HTML head will pick it
     up automatically). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Von Peach">
  <rect width="64" height="64" rx="12" fill="#FFD6BB"/>
  <text x="32" y="49"
        text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', 'Aileron', sans-serif"
        font-weight="900"
        font-size="46"
        font-style="italic"
        letter-spacing="-2"
        fill="#1a0610">VP</text>
</svg>
