name = "vonpeach-portrait"
main = "src/index.js"
compatibility_date = "2025-05-01"

# Verified Resend sender. Change this to your domain once you've verified it
# in Resend (https://resend.com/domains). The placeholder onboarding sender
# below works for tests-to-yourself only.
[vars]
FROM_EMAIL = "Von Peach <hello@vonpeach.com>"
# Generation pipeline. "snapchat" uses face-to-many + flux i2i for dramatic
# identity preservation (Snapchat / Lensa / Toonify-style). "pulid" uses the
# legacy flux-pulid text-to-image pipeline with face anchor.
#
# ROLLED BACK to "pulid" — the Snapchat pipeline's face-to-many call body
# doesn't match the live API schema, so requests were 4xx-ing and clients
# were falling back to "original-photo-with-duotone." We'll re-enable
# "snapchat" once the face-to-many call is corrected (separate PR).
PIPELINE = "pulid"

# R2 bucket for the admin portrait gallery — every successful generation is
# written here. Create the bucket once with:
#   wrangler r2 bucket create vonpeach-portraits
[[r2_buckets]]
binding = "PORTRAITS"
bucket_name = "vonpeach-portraits"

# Workers AI — used for a quick vision pre-pass on the user's photo so we can
# inject gender / hair / eye descriptors into the PuLID prompt. Without this
# the prompt is silent on identity and Flux defaults to "woman in a gown".
[ai]
binding = "AI"

# Secrets — set via wrangler, never commit:
#   wrangler secret put FAL_KEY
#   wrangler secret put RESEND_KEY
#   wrangler secret put GALLERY_KEY     (passcode for /gallery view)
#
# Optional — set to upgrade the vision pre-pass from free Workers AI Llama
# 3.2 Vision to GPT-4o-mini Vision (much more accurate at stubble, piercings,
# freckles, glasses-subtype, tattoo content). ~$0.0005 per render.
#   wrangler secret put OPENAI_API_KEY   (optional; falls back to Workers AI)
